<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>我的徒步足迹 - 保持探索世界的心</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <!-- 回归经典：Leaflet 与 Leaflet-GPX 插件，极致轻量，秒级加载 -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet-gpx/1.7.0/gpx.min.js"></script>

    <!-- ECharts GL：负责宏观 3D 中国板块渲染 -->
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.5.0/dist/echarts.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/echarts-gl@2.0.9/dist/echarts-gl.min.js"></script>

    <style>
        /* ===== 核心变量 (极简莫兰迪暗黑) ===== */
        :root {
            --primary-green: #8fa486;
            --neon-green: #4ade80;
            --bg-space: #030712;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --card-glass: rgba(255, 255, 255, 0.03);
            --border-glow: rgba(255, 255, 255, 0.08);
        }

        body {
            font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, Roboto, sans-serif;
            margin: 0; background-color: var(--bg-space); color: var(--text-main); overflow-x: hidden;
            background-image:
                radial-gradient(1px 1px at 20px 30px, rgba(255,255,255,0.8), rgba(0,0,0,0)),
                radial-gradient(2px 2px at 80px 120px, rgba(255,255,255,0.4), rgba(0,0,0,0)),
                radial-gradient(1.5px 1.5px at 150px 40px, rgba(255,255,255,0.9), rgba(0,0,0,0)),
                radial-gradient(2px 2px at 220px 180px, rgba(255,255,255,0.3), rgba(0,0,0,0)),
                radial-gradient(1px 1px at 280px 90px, rgba(255,255,255,0.6), rgba(0,0,0,0));
            background-repeat: repeat; background-size: 300px 300px;
        }

        /* ================= 第一部分：太空探索起始页 ================= */
        #intro-screen {
            position: fixed; inset: 0; z-index: 9999; display: flex; justify-content: center; background-color: #000; overflow: hidden;
        }
        .intro-bg {
            position: absolute; inset: 0; background-image: url('photos/intro-bg.jpg'); background-size: cover; background-position: center;
            transform-origin: 75% 55%; transition: transform 3.5s cubic-bezier(0.64, 0, 0.2, 1), filter 3s ease;
        }
        .zoom-into-asia { transform: scale(25) translate(-5%, 5%); filter: blur(8px) brightness(1.5); }
        .intro-overlay { position: absolute; inset: 0; background: linear-gradient(to bottom, rgba(0,0,0,0.1) 0%, rgba(0,0,0,0.8) 100%); transition: opacity 1s ease; }
        .explore-btn {
            position: absolute; top: 33vh; z-index: 10000; background: rgba(255,255,255,0.1); backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255,255,255,0.3); color: #fff; padding: 16px 32px; border-radius: 50px; font-size: 1.1rem; letter-spacing: 3px; cursor: pointer;
            box-shadow: 0 4px 20px rgba(0,0,0,0.5); transition: all 0.3s ease; animation: pulse-glow 2.5s infinite;
        }
        .explore-btn:active { transform: scale(0.95); }
        @keyframes pulse-glow { 0%, 100% { box-shadow: 0 0 10px rgba(255,255,255,0.2); } 50% { box-shadow: 0 0 25px rgba(255,255,255,0.6); } }
        .fade-out { opacity: 0 !important; pointer-events: none; }

        #cloud-transition {
            position: fixed; inset: 0; z-index: 10005; pointer-events: none;
            background: radial-gradient(circle at center, rgba(240,248,255,1) 0%, rgba(143,164,134,0.5) 60%, rgba(0,0,0,0) 100%);
            opacity: 0; transform: scale(0.2); transition: opacity 1s ease-in, transform 1.5s ease-in;
        }
        #cloud-transition.enter-clouds { opacity: 1; transform: scale(2); }
        #cloud-transition.leave-clouds { opacity: 0; transform: scale(5); transition: opacity 2s ease-out, transform 2s ease-out; }

        /* ================= 第二部分：主页面 ================= */
        #main-wrapper {
            opacity: 0; transform: translateY(30px); transition: opacity 2s ease-out, transform 2s cubic-bezier(0.2, 0.8, 0.2, 1);
            pointer-events: none; min-height: 100vh;
        }
        #main-wrapper.active { opacity: 1; transform: translateY(0); pointer-events: auto; }

        #hologram-section {
            position: relative; width: 100%; height: 520px; display: flex; flex-direction: column; align-items: center; justify-content: flex-start;
            overflow: hidden; padding-top: 2rem; background: linear-gradient(180deg, transparent 0%, rgba(3,7,18,0.95) 85%, rgba(3,7,18,1) 100%);
            transition: opacity 0.5s ease, visibility 0.5s ease;
        }
        header { position: relative; z-index: 10; text-align: center; }
        header h1 { margin: 0; color: var(--primary-green); letter-spacing: 2px; text-shadow: 0 0 20px rgba(143,164,134,0.3); line-height: 1.5; font-size: 1.8rem; }
        .map-3d-container { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; }
        #china-3d-map { width: 100%; height: 100%; }

        .stats-banner {
            display: flex; justify-content: center; gap: 4rem; padding: 1rem 2rem 2rem; border-bottom: 1px solid var(--border-glow); margin-bottom: 0; position: relative; z-index: 10;
        }
        .stat-item { text-align: center; }
        .stat-item h3 { margin: 0; color: var(--text-main); font-size: 2.2rem; font-weight: 300; }
        .stat-item p { margin: 5px 0 0; font-size: 0.85rem; color: var(--primary-green); letter-spacing: 1px; }

        /* ================= 星环卡片区 ================= */
        #ring-scene {
            position: relative; width: 100%; height: 660px; perspective: 1200px; perspective-origin: 50% 38%; overflow: visible; margin: 0 auto; z-index: 10;
        }
        #trips-grid {
            position: absolute; width: 0; height: 0; top: 52%; left: 50%; transform-style: preserve-3d;
            transform: rotateX(-18deg) rotateY(0deg); animation: ring-spin 90s linear infinite; animation-play-state: paused;
        }
        #trips-grid.spinning { animation-play-state: running; }
        #ring-scene:hover #trips-grid.spinning { animation-play-state: paused; }
        @keyframes ring-spin { from { transform: rotateX(-18deg) rotateY(0deg); } to { transform: rotateX(-18deg) rotateY(360deg); } }
        
        .ring-card {
            position: absolute; width: 272px; margin-left: -136px; margin-top: -170px; transform-style: preserve-3d;
            backface-visibility: hidden; -webkit-backface-visibility: hidden; will-change: transform;
            background: var(--card-glass); border: 1px solid var(--border-glow); border-radius: 16px; overflow: hidden;
            backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px); cursor: pointer; transition: border-color 0.35s ease, box-shadow 0.35s ease;
        }
        .ring-card:hover {
            border-color: rgba(143,164,134,0.5); box-shadow: 0 0 0 1px rgba(143,164,134,0.2), 0 0 30px rgba(143,164,134,0.18), 0 20px 60px rgba(0,0,0,0.8);
        }
        .ring-card .trip-image { width: 100%; height: 172px; object-fit: cover; display: block; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .ring-card .trip-content { padding: 1rem 1.2rem 1.2rem; }
        .ring-card .trip-title { margin: 0 0 0.4rem; font-size: 1.05rem; color: var(--text-main); font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .ring-card .trip-meta { font-size: 0.78rem; color: var(--text-muted); margin-bottom: 0.9rem; letter-spacing: 0.8px; }
        .ring-card .trip-stats { display: flex; justify-content: space-between; border-top: 1px solid var(--border-glow); padding-top: 0.75rem; font-size: 0.8rem; color: var(--primary-green); }
        
        #ring-hint {
            position: absolute; bottom: 18px; left: 50%; transform: translateX(-50%); font-size: 0.78rem; color: var(--text-muted); letter-spacing: 1.5px;
            opacity: 0; transition: opacity 1s ease 1s; pointer-events: none; white-space: nowrap;
        }
        #ring-hint.visible { opacity: 1; }
        #error-msg { text-align: center; color: #ef4444; padding: 2rem; }

        /* ================= 弹窗 ================= */
        .modal {
            display: none; position: fixed; z-index: 10000; left: 0; top: 0; width: 100%; height: 100%; background-color: rgba(0,0,0,0.92); overflow-y: auto;
            backdrop-filter: blur(10px); opacity: 0; transition: opacity 0.3s ease;
        }
        .modal.show { opacity: 1; }
        .modal-content {
            background-color: #090f1e; margin: 4% auto; padding: 3rem; width: 90%; max-width: 900px; border-radius: 24px; position: relative;
            border: 1px solid rgba(255,255,255,0.08); transform: translateY(20px); transition: transform 0.3s ease;
        }
        .modal.show .modal-content { transform: translateY(0); }
        .close-btn { position: absolute; right: 30px; top: 20px; font-size: 2.5rem; cursor: pointer; color: var(--text-muted); z-index: 100;}
        .close-btn:hover { color: #fff; }
        .photo-gallery { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 15px; margin-top: 1rem; }
        .gallery-img { width: 100%; height: 160px; object-fit: cover; border-radius: 12px; border: 1px solid var(--border-glow); }

        /* ===== Leaflet 极简暗黑改造 ===== */
        .leaflet-container {
            width: 100%; height: 500px; border-radius: 16px; border: 1px solid var(--border-glow); z-index: 1;
            background: #030712 !important; /* 防止加载时的白底闪烁 */
        }
        /* 神奇滤镜：将高德默认地图转换为极具科技感的高对比暗黑地图 */
        .leaflet-tile-pane {
            filter: invert(100%) hue-rotate(180deg) brightness(0.85) contrast(1.1) grayscale(0.2);
            transition: filter 0.5s ease;
        }
        .leaflet-control-attribution { display: none !important; } /* 隐藏下方版权，保持极简 */
        .leaflet-popup-content-wrapper { background: rgba(9,15,30,0.92); color: var(--primary-green); border: 1px solid var(--border-glow); border-radius: 8px; }
        .leaflet-popup-tip { border-top-color: rgba(9,15,30,0.92); }

        /* ================= 手机端适配 ================= */
        @media (max-width: 768px) {
            header h1 { font-size: 1.4rem; }
            .explore-btn { top: 33vh; padding: 15px 30px; font-size: 1rem; }
            #hologram-section { height: 400px; }
            .stats-banner { gap: 2rem; padding: 1rem; flex-wrap: wrap; margin-top: -10px; }
            #ring-scene { height: 520px; perspective: 800px; }
            .ring-card { width: 220px; margin-left: -110px; margin-top: -145px; }
            .ring-card .trip-image { height: 140px; }
            .modal-content { width: 100%; margin: 0; min-height: 100vh; border-radius: 0; padding: 2rem 1.2rem; }
            .close-btn { right: 20px; top: 15px; }
            #modal-detail-body > div:nth-child(2) { grid-template-columns: 1fr 1fr !important; gap: 12px !important; }
            .photo-gallery { grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 10px; }
            .leaflet-container { height: 350px; }
        }
    </style>
</head>
<body>

    <div id="cloud-transition"></div>

    <div id="intro-screen">
        <div class="intro-bg" id="intro-bg"></div>
        <div class="intro-overlay" id="intro-overlay"></div>
        <button class="explore-btn" id="explore-btn">保持探索世界的心</button>
    </div>

    <div id="main-wrapper">
        <div id="hologram-section">
            <header>
                <h1><i class="fas fa-satellite"></i> 爱并非存在于相互的凝视<br>而是两个人一起望向外在的同一方向</h1>
            </header>
            <div class="map-3d-container">
                <div id="china-3d-map"></div>
            </div>
        </div>

        <div class="stats-banner">
            <div class="stat-item"><h3 id="total-trips">-</h3><p>探索轨迹</p></div>
            <div class="stat-item"><h3 id="total-dist">-</h3><p>累计里程 (KM)</p></div>
        </div>

        <div id="error-msg"></div>

        <div id="ring-scene">
            <div id="trips-grid"></div>
            <div id="ring-hint">— 悬停暂停 · 点击探索 —</div>
        </div>
    </div>

    <div id="trip-modal" class="modal">
        <div class="modal-content">
            <span class="close-btn" onclick="closeModal()">&times;</span>
            <div id="modal-detail-body"></div>
        </div>
    </div>

    <script>
    /* ================================================================
       全局状态
    ================================================================ */
    let allTrips            = [];
    let echartMap           = null;
    let visitedProvincesMapData = [];
    let mapGeoReady         = false;
    let leafletMap          = null; 
    let echartWasActive     = false;

    /* ================================================================
       转场动画序列
    ================================================================ */
    document.getElementById('explore-btn').addEventListener('click', function() {
        const btn             = this;
        const introBg         = document.getElementById('intro-bg');
        const introOverlay    = document.getElementById('intro-overlay');
        const introScreen     = document.getElementById('intro-screen');
        const mainWrapper     = document.getElementById('main-wrapper');
        const cloudTransition = document.getElementById('cloud-transition');

        btn.innerText = "风沙星辰";
        btn.style.animation = "none";
        setTimeout(() => { btn.classList.add('fade-out'); introOverlay.classList.add('fade-out'); }, 200);
        introBg.classList.add('zoom-into-asia');
        setTimeout(() => { cloudTransition.classList.add('enter-clouds'); }, 1300);
        setTimeout(() => {
            introScreen.style.display = 'none';
            mainWrapper.classList.add('active');
        }, 2000);
        setTimeout(() => {
            cloudTransition.classList.replace('enter-clouds', 'leave-clouds');
            if (mapGeoReady) {
                render3DMap();
            } else {
                const waitForMap = setInterval(() => {
                    if (mapGeoReady) { clearInterval(waitForMap); render3DMap(); }
                }, 200);
            }
        }, 2300);
    });

    /* ================================================================
       数据加载
    ================================================================ */
    async function loadTrips() {
        try {
            let data;
            try {
                const response = await fetch('trips.json');
                if (!response.ok) throw new Error('无法读取数据文件');
                data = await response.json();
            } catch (fetchErr) {
                console.warn("未检测到网络数据，启用备用数据");
                data = {
                    "trips": [
                        {
                            "name": "武功山反穿", "date": "2023-09", "season": "秋", "location": { "region": "江西萍乡", "coordinates": { "lat": 27.45, "lng": 114.16 } },
                            "cover_photo": "https://images.unsplash.com/photo-1438761681033-6461ffad8d80?w=600",
                            "stats": { "distance_km": 30.5, "elevation_gain_m": 2100, "difficulty": "高级", "calories_kcal": 2800, "avg_heart_rate_bpm": 155, "duration_hours": 14 },
                            "note": "这是一段复刻的记忆，基于朋友圈截图重建的轨迹。",
                            "data_type": "reconstructed",
                            "photos": [{ "file": "https://images.unsplash.com/photo-1438761681033-6461ffad8d80?w=600", "caption": "记忆残像" }]
                        },
                        {
                            "name": "四姑娘山大环线", "date": "2024-10", "season": "秋", "location": { "region": "四川阿坝", "coordinates": { "lat": 31.1, "lng": 102.9 } },
                            "cover_photo": "https://images.unsplash.com/photo-1542332213-9b5a5a3fad35?w=600",
                            "stats": { "distance_km": 45.0, "elevation_gain_m": 3500, "difficulty": "史诗", "calories_kcal": 5000, "avg_heart_rate_bpm": 160, "duration_hours": 30 },
                            "note": "完整 FIT 记录，坚实的物理足迹。",
                            "data_type": "complete",
                            "photos": [{ "file": "https://images.unsplash.com/photo-1542332213-9b5a5a3fad35?w=600", "caption": "真实足迹" }]
                        }
                    ]
                };
            }

            allTrips = data.trips;
            renderCards();
            updateStats();

            const mapGeoJson = await fetch('https://cdn.jsdelivr.net/npm/echarts@5.5.0/node_modules/echarts/map/json/china.json').then(r => r.ok ? r.json() : null).catch(() => null);
            const geoData = mapGeoJson || await fetch('https://fastly.jsdelivr.net/npm/echarts@4.9.0/map/json/china.json').then(r => r.json());

            echarts.registerMap('china', geoData);
            mapGeoReady = true;

            const visitedNames  = new Set();
            const provinceNames = ["北京","天津","上海","重庆","河北","河南","云南","辽宁",
                "黑龙江","湖南","安徽","山东","新疆","江苏","浙江","江西","湖北","广西",
                "甘肃","山西","内蒙古","陕西","吉林","福建","贵州","广东","青海","西藏",
                "四川","宁夏","海南","台湾","香港","澳门"];
            allTrips.forEach(trip => {
                const loc = trip.location.region;
                for (const prov of provinceNames) {
                    if (loc.includes(prov)) visitedNames.add(prov);
                }
            });
            visitedProvincesMapData = Array.from(visitedNames).map(name => ({
                name, value: 1, regionHeight: 4,
                itemStyle: { color: '#8fa486', opacity: 1, borderWidth: 1, borderColor: '#e8ece6' }
            }));

        } catch (err) {
            console.error(err);
            document.getElementById('error-msg').innerHTML = `<p>加载失败: ${err.message}</p>`;
        }
    }

    /* ================================================================
       ECharts GL 3D 地形引擎
    ================================================================ */
    function render3DMap() {
        const container = document.getElementById('china-3d-map');
        if (!container) return;
        if (echartMap) { echartMap.dispose(); echartMap = null; }
        echartMap = echarts.init(container);

        echartMap.setOption({
            series: [{
                type: 'map3D', map: 'china', regionHeight: 1,
                itemStyle: {
                    color: 'rgba(42,50,60,0.8)', opacity: 1,
                    borderWidth: 1, borderColor: 'rgba(143,164,134,0.3)'
                },
                shading: 'lambert',
                light: {
                    main:    { intensity: 1.2, shadow: true, alpha: 40, beta: -30 },
                    ambient: { intensity: 0.5 }
                },
                viewControl: {
                    projection: 'perspective', autoRotate: true, autoRotateSpeed: 4,
                    distance: 70, alpha: 50, beta: 5,
                    animationDurationUpdate: 2000, animationEasingUpdate: 'cubicInOut'
                },
                emphasis: { label: { show: false }, itemStyle: { color: 'rgba(143,164,134,0.9)' } },
                label: { show: false },
                data: visitedProvincesMapData
            }]
        });

        requestAnimationFrame(() => {
            document.getElementById('trips-grid').classList.add('spinning');
            document.getElementById('ring-hint').classList.add('visible');
            echartWasActive = true;
        });
    }

    /* ================================================================
       星环卡片渲染
    ================================================================ */
    function renderCards() {
        const orbit = document.getElementById('trips-grid');
        orbit.innerHTML = '';
        const N = allTrips.length;
        if (N === 0) return;

        const isMobile  = window.innerWidth < 768;
        const cardWidth = isMobile ? 220 : 272;
        const cardGap   = 30;
        const minRadius = isMobile ? 260 : 360;
        const radius    = Math.max(minRadius, Math.round((cardWidth + cardGap) / (2 * Math.tan(Math.PI / N))));

        allTrips.forEach((trip, i) => {
            const angle = (360 / N) * i;
            const card  = document.createElement('div');
            card.className = 'ring-card';
            card.style.transform = `rotateY(${angle}deg) translateZ(${radius}px)`;
            card.onclick = () => showTripDetail(i);
            card.innerHTML = `
                <img src="${trip.cover_photo}" alt="${trip.name}" class="trip-image"
                     onerror="this.src='https://via.placeholder.com/400x200/0b1120/8fa486?text=未找到图片'">
                <div class="trip-content">
                    <div class="trip-meta">${trip.date} · ${trip.season}</div>
                    <h2 class="trip-title">${trip.name}</h2>
                    <div class="trip-stats">
                        <span><i class="fas fa-route"></i> ${trip.stats.distance_km}km</span>
                        <span><i class="fas fa-arrow-up"></i> ${trip.stats.elevation_gain_m}m</span>
                        <span><i class="fas fa-signal"></i> ${trip.stats.difficulty}</span>
                    </div>
                </div>`;
            orbit.appendChild(card);
        });

        let resumeTimer = null;
        const scene = document.getElementById('ring-scene');
        scene.addEventListener('touchstart', () => { orbit.style.animationPlayState = 'paused'; clearTimeout(resumeTimer); }, { passive: true });
        scene.addEventListener('touchend', () => { resumeTimer = setTimeout(() => { orbit.style.animationPlayState = ''; }, 2000); }, { passive: true });
    }

    function updateStats() {
        document.getElementById('total-trips').innerText = allTrips.length;
        document.getElementById('total-dist').innerText = allTrips.reduce((sum, t) => sum + t.stats.distance_km, 0).toFixed(1);
    }

    /* ================================================================
       弹窗详情与 Leaflet 初始化
    ================================================================ */
    function showTripDetail(index) {
        const trip  = allTrips[index];
        const body  = document.getElementById('modal-detail-body');
        const modal = document.getElementById('trip-modal');

        // 【性能优化】隐藏 ECharts，释放手机屏幕渲染压力
        document.getElementById('hologram-section').style.opacity = '0';
        setTimeout(() => { document.getElementById('hologram-section').style.visibility = 'hidden'; }, 500);

        const photoGalleryHtml = trip.photos.map(p => `
            <div class="gallery-item">
                <img src="${p.file}" class="gallery-img"
                     onerror="this.src='https://via.placeholder.com/200x150/0b1120/94a3b8?text=图片丢失'">
                <p style="font-size:0.85rem;color:var(--text-muted);margin-top:5px;">${p.caption}</p>
            </div>`).join('');

        body.innerHTML = `
            <div style="border-bottom:1px solid var(--border-glow);margin-bottom:2rem;padding-bottom:1rem;">
                <h1 style="margin:0 0 10px;color:var(--text-main);font-size:2rem;">${trip.name}</h1>
                <p style="color:var(--text-muted);margin:0;font-size:0.95rem;">
                    <i class="fas fa-calendar-alt"></i> ${trip.date} &nbsp;&nbsp;|&nbsp;&nbsp;
                    <i class="fas fa-map-marker-alt"></i> ${trip.location.region}
                </p>
            </div>

            <div style="display:grid;grid-template-columns:1fr 1fr;gap:15px;margin-bottom:2rem;
                background:rgba(255,255,255,0.02);padding:20px;border-radius:16px;border:1px solid var(--border-glow);">
                <div><strong style="color:var(--text-muted)">🔥 消耗</strong><br>
                    <span style="font-size:1.2rem;color:var(--text-main)">${trip.stats.calories_kcal}</span> kcal</div>
                <div><strong style="color:var(--text-muted)">💓 心率</strong><br>
                    <span style="font-size:1.2rem;color:var(--text-main)">${trip.stats.avg_heart_rate_bpm}</span> bpm</div>
                <div><strong style="color:var(--text-muted)">⏱️ 耗时</strong><br>
                    <span style="font-size:1.2rem;color:var(--text-main)">${trip.stats.duration_hours}</span> h</div>
                <div><strong style="color:var(--text-muted)">⛰️ 爬升</strong><br>
                    <span style="font-size:1.2rem;color:var(--text-main)">${trip.stats.elevation_gain_m}</span> m</div>
            </div>

            <div style="line-height:1.8;margin-bottom:2.5rem;font-size:1.05rem;">
                <h3 style="border-left:4px solid var(--primary-green);padding-left:12px;margin-bottom:15px;font-weight:500;">心路历程</h3>
                <p style="color:#cbd5e1;">${trip.note}</p>
            </div>

            <div style="margin-bottom:2.5rem;">
                <h3 style="border-left:4px solid var(--primary-green);padding-left:12px;margin-bottom:15px;font-weight:500;">精彩瞬间</h3>
                <div class="photo-gallery">${photoGalleryHtml}</div>
            </div>

            <div>
                <h3 style="border-left:4px solid var(--primary-green);padding-left:12px;margin-bottom:15px;font-weight:500;">
                    徒步路线图
                    <span style="font-size:0.72rem;font-weight:400;color:var(--text-muted);letter-spacing:1.5px;margin-left:12px;">
                        极简模式 · 高效渲染
                    </span>
                </h3>
                <div id="real-map" class="leaflet-container"></div>
            </div>`;

        modal.style.display = "block";
        document.body.style.overflow = "hidden";
        setTimeout(() => modal.classList.add('show'), 10);

        // 初始化经典的 Leaflet 引擎
        setTimeout(() => {
            if (leafletMap !== null) { leafletMap.remove(); }
            
            leafletMap = L.map('real-map', {
                zoomControl: false // 隐藏缩放按钮，保持极简
            }).setView([trip.location.coordinates.lat, trip.location.coordinates.lng], 12);
            
            L.control.zoom({ position: 'bottomright' }).addTo(leafletMap);

            // 接入高德矢量地图（配合我们在 CSS 里写好的 filter 暗黑反转滤镜）
            L.tileLayer('http://webrd01.is.autonavi.com/appmaptile?lang=zh_cn&size=1&scale=1&style=8&x={x}&y={y}&z={z}', {
                maxZoom: 18,
                attribution: '© Amap'
            }).addTo(leafletMap);

            // 记忆虚实线逻辑判断
            const isReconstructed = trip.data_type === 'reconstructed';

            if (trip.gpx_file) {
                new L.GPX(trip.gpx_file, {
                    async: true,
                    marker_options: {
                        startIconUrl: 'https://cdnjs.cloudflare.com/ajax/libs/leaflet-gpx/1.7.0/pin-icon-start.png',
                        endIconUrl: 'https://cdnjs.cloudflare.com/ajax/libs/leaflet-gpx/1.7.0/pin-icon-end.png',
                        shadowUrl: 'https://cdnjs.cloudflare.com/ajax/libs/leaflet-gpx/1.7.0/pin-shadow.png'
                    },
                    polyline_options: {
                        color: '#4ade80', // 霓虹绿
                        opacity: isReconstructed ? 0.6 : 0.9,
                        weight: isReconstructed ? 3 : 5,
                        lineCap: 'round',
                        dashArray: isReconstructed ? '5, 8' : '' // 如果是朋友圈复刻，显示虚线
                    }
                }).on('loaded', function(e) {
                    leafletMap.fitBounds(e.target.getBounds(), { padding: [30, 30] });
                }).addTo(leafletMap);
            } else {
                L.marker([trip.location.coordinates.lat, trip.location.coordinates.lng]).addTo(leafletMap);
            }
        }, 350);
    }

    function closeModal() {
        const modal = document.getElementById('trip-modal');
        modal.classList.remove('show');
        
        // 恢复底层 ECharts 的显示
        document.getElementById('hologram-section').style.visibility = 'visible';
        document.getElementById('hologram-section').style.opacity = '1';

        setTimeout(() => {
            modal.style.display = "none";
            document.body.style.overflow = "auto";
        }, 300);
    }

    window.onclick = e => { if (e.target === document.getElementById('trip-modal')) closeModal(); };
    window.addEventListener('resize', () => { if (echartMap) echartMap.resize(); });

    loadTrips();
    </script>
</body>
</html>
